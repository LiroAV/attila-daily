<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Attila's Daily</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Daily">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #000; --bg2: #1c1c1e; --bg3: #2c2c2e;
      --text: #fff; --text2: rgba(235,235,245,0.6); --text3: rgba(235,235,245,0.3);
      --accent: #0A84FF; --green: #30d158; --red: #ff453a; --orange: #ff9f0a; --purple: #bf5af2;
      --border: rgba(84,84,88,0.55); --card: #1c1c1e;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; height: 100svh; overflow: hidden; display: flex; flex-direction: column; }
    .safe-top { height: env(safe-area-inset-top, 44px); background: var(--bg); flex-shrink: 0; }

    /* ── Header ── */
    .header { padding: 6px 20px 12px; flex-shrink: 0; display: flex; align-items: flex-end; justify-content: space-between; }
    .greeting { font-size: 12px; color: var(--text2); margin-bottom: 1px; }
    .date-line { font-size: 24px; font-weight: 700; letter-spacing: -0.4px; }
    .header-right { display: flex; gap: 8px; align-items: center; padding-bottom: 2px; }
    .icon-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--bg3); border: none; color: var(--text); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .icon-btn:active { opacity: 0.6; }
    .x-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--bg3); border: none; color: var(--text); font-size: 14px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, color 0.15s; }
    .x-btn.active { background: var(--text); color: var(--bg); }
    .x-btn:active { opacity: 0.6; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg,#0A84FF,#BF5AF2); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; }

    /* ── X mode ── */
    .x-banner { margin: 0 16px 14px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
    .x-banner-label { font-size: 13px; font-weight: 700; }
    .x-banner-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .x-topic-header { margin: 4px 16px 10px; display: flex; align-items: center; justify-content: space-between; }
    .x-topic-name { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; }
    .x-topic-count { font-size: 12px; color: var(--text3); }
    .x-card { margin: 0 16px 10px; background: var(--card); border-radius: 14px; border: 0.5px solid var(--border); padding: 14px 16px; }
    .x-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .x-handle { font-size: 13px; font-weight: 700; color: var(--text2); }
    .x-time { font-size: 12px; color: var(--text3); }
    .x-text { font-size: 15px; line-height: 1.55; margin-bottom: 10px; }
    .x-link { font-size: 12px; color: var(--accent); font-weight: 600; text-decoration: none; }
    .x-link:active { opacity: 0.6; }

    /* ── Tab bar ── */
    .tab-bar { display: flex; background: rgba(28,28,30,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 0.5px solid var(--border); padding: 10px 0 calc(10px + env(safe-area-inset-bottom,16px)); flex-shrink: 0; }
    .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 2px 0; }
    .tab-item:active { opacity: 0.6; }
    .tab-label { font-size: 12px; font-weight: 600; color: var(--text3); letter-spacing: 0.2px; }
    .tab-item.active .tab-label { color: var(--accent); }

    /* ── Scroll area ── */
    .content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
    .tab-pane { display: none; padding-bottom: 28px; }
    .tab-pane.active { display: block; }

    /* ── Daily bar ── */
    .daily-bar { margin: 0 16px 14px; background: linear-gradient(135deg, rgba(10,132,255,0.1), rgba(191,90,242,0.1)); border: 0.5px solid rgba(10,132,255,0.2); border-radius: 14px; padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; }
    .daily-bar-text strong { display: block; font-size: 15px; font-weight: 700; }
    .daily-bar-text span { font-size: 12px; color: var(--text2); margin-top: 2px; display: block; }
    .daily-bar-mins { text-align: right; }
    .daily-bar-mins .num { font-size: 28px; font-weight: 800; color: var(--accent); line-height: 1; }
    .daily-bar-mins .lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; }

    /* ── Category pills ── */
    .pills { padding: 0 16px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
    .pill { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; border: none; transition: transform 0.1s; }
    .pill:active { transform: scale(0.95); }
    .pill-all { background: var(--bg3); color: var(--text); }
    .pill-all.active { background: var(--text); color: var(--bg); }
    .pill-AI { background: rgba(10,132,255,0.15); color: #0A84FF; border: 1px solid transparent; }
    .pill-AI.active { border-color: #0A84FF; }
    .pill-Technology { background: rgba(48,209,88,0.15); color: #30d158; border: 1px solid transparent; }
    .pill-Technology.active { border-color: #30d158; }
    .pill-Research { background: rgba(191,90,242,0.15); color: #bf5af2; border: 1px solid transparent; }
    .pill-Research.active { border-color: #bf5af2; }
    .pill-Stocks { background: rgba(255,159,10,0.15); color: #ff9f0a; border: 1px solid transparent; }
    .pill-Stocks.active { border-color: #ff9f0a; }

    /* ── Topic section ── */
    .topic-block { margin-bottom: 8px; }
    .topic-header { margin: 4px 16px 12px; display: flex; align-items: center; justify-content: space-between; }
    .topic-header-left { display: flex; align-items: center; gap: 8px; }
    .topic-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .topic-name { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; }
    .topic-meta { font-size: 12px; color: var(--text3); }

    /* ── Article card ── */
    .article-card { margin: 0 16px 10px; background: var(--card); border-radius: 16px; border: 0.5px solid var(--border); padding: 16px; }
    .article-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    /* ── Score badge ── */
    .score-badge { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; flex-shrink: 0; }
    .article-source { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
    .article-title { font-size: 18px; font-weight: 800; line-height: 1.25; letter-spacing: -0.3px; margin-bottom: 10px; }
    .article-summary { font-size: 14px; color: var(--text2); line-height: 1.65; margin-bottom: 12px; }
    .article-footer { display: flex; align-items: center; justify-content: space-between; }
    .article-ago { font-size: 12px; color: var(--text3); }
    .article-read-link { font-size: 12px; color: var(--accent); font-weight: 600; text-decoration: none; }
    .article-read-link:active { opacity: 0.6; }

    /* ── Category overview ── */
    .cat-overview { margin: 0 16px 14px; border-radius: 14px; border: 0.5px solid var(--border); padding: 14px 16px; background: var(--bg2); }
    .cat-overview-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 10px; }
    .cat-overview-item { display: flex; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--border); align-items: flex-start; }
    .cat-overview-item:last-child { border-bottom: none; padding-bottom: 0; }
    .cat-overview-score { font-size: 12px; font-weight: 800; width: 22px; flex-shrink: 0; padding-top: 1px; }
    .cat-overview-text { font-size: 13px; color: var(--text2); line-height: 1.45; }

    /* ── Skeleton ── */
    .skel { background: linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%); background-size: 200% 100%; animation: shim 1.5s infinite; border-radius: 8px; }
    @keyframes shim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skel-card { margin: 0 16px 10px; height: 180px; border-radius: 16px; }
    .skel-line { height: 14px; margin-bottom: 8px; }

    /* ── Error ── */
    .err-note { margin: 0 16px 10px; background: rgba(255,69,58,.1); border: 0.5px solid rgba(255,69,58,.3); border-radius: 10px; padding: 9px 13px; font-size: 13px; color: var(--red); display: none; }

    /* ── Empty ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
    .empty p { font-size: 15px; line-height: 1.5; }

    /* ── TASKS ── */
    .tasks-head { padding: 4px 16px 14px; display: flex; align-items: center; justify-content: space-between; }
    .tasks-title { font-size: 22px; font-weight: 700; }
    .tasks-badge { font-size: 12px; font-weight: 600; color: var(--text2); background: var(--bg3); padding: 3px 9px; border-radius: 10px; }
    .task-row-input { padding: 0 16px 14px; display: flex; gap: 8px; }
    .task-inp { flex: 1; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px; padding: 12px 15px; font-size: 15px; color: var(--text); font-family: inherit; outline: none; }
    .task-inp:focus { border-color: var(--accent); }
    .task-inp::placeholder { color: var(--text3); }
    .task-add-btn { width: 44px; height: 44px; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .task-add-btn:active { opacity: 0.7; }
    .task-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
    .task-row { background: var(--card); border-radius: 12px; padding: 13px 14px; display: flex; align-items: center; gap: 11px; border: 0.5px solid var(--border); }
    .task-row.done { opacity: 0.4; }
    .task-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .task-check.on { background: var(--green); border-color: var(--green); }
    .task-check.on::after { content: '✓'; font-size: 12px; color: #fff; font-weight: 700; }
    .task-txt { flex: 1; font-size: 15px; line-height: 1.3; }
    .task-row.done .task-txt { text-decoration: line-through; color: var(--text2); }
    .task-del { width: 26px; height: 26px; border-radius: 50%; background: rgba(255,69,58,.12); border: none; color: var(--red); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* ── CALENDAR ── */
    .cal-card { margin: 0 16px 16px; background: var(--card); border-radius: 16px; border: 0.5px solid var(--border); overflow: hidden; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 8px; }
    .cal-month { font-size: 17px; font-weight: 600; }
    .cal-btn { background: none; border: none; color: var(--accent); font-size: 22px; cursor: pointer; padding: 2px 8px; }
    .cal-grid { padding: 0 12px 12px; }
    .cal-dow { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 4px; }
    .cal-dow span { text-align: center; font-size: 11px; font-weight: 600; color: var(--text3); padding: 3px 0; }
    .cal-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
    .cal-d { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; color: var(--text); cursor: pointer; }
    .cal-d.dim { color: var(--text3); }
    .cal-d.today { background: var(--accent); font-weight: 700; color: #fff; }
    .gcal-btn-wrap { margin: 0 16px; background: linear-gradient(135deg,rgba(10,132,255,.12),rgba(191,90,242,.12)); border: 0.5px solid rgba(10,132,255,.25); border-radius: 16px; padding: 20px; text-align: center; }
    .gcal-btn-wrap h3 { font-size: 16px; font-weight: 600; margin-bottom: 5px; }
    .gcal-btn-wrap p { font-size: 13px; color: var(--text2); margin-bottom: 14px; line-height: 1.4; }
    .gcal-open { display: inline-flex; align-items: center; gap: 6px; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 10px 20px; font-size: 15px; font-weight: 600; text-decoration: none; }

    .spin { animation: rot 1s linear infinite; display: inline-block; }
    @keyframes rot { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { display: none; }
    .divider { height: 1px; background: var(--border); margin: 12px 16px 16px; }
  </style>
</head>
<body>
<div class="safe-top"></div>
<div class="header">
  <div>
    <div class="greeting" id="greeting">Good morning, Attila</div>
    <div class="date-line" id="dateLine">Wednesday</div>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="refreshBtn" onclick="refreshAll()">↻</button>
    <button class="x-btn" id="xModeBtn" onclick="toggleXMode()">X</button>
    <div class="avatar">A</div>
  </div>
</div>

<div class="content" id="content">

  <!-- ── BRIEF ── -->
  <div class="tab-pane active" id="pane-brief">
    <div class="daily-bar">
      <div class="daily-bar-text">
        <strong>Your Daily Brief</strong>
        <span id="briefSub">Loading today's stories…</span>
      </div>
      <div class="daily-bar-mins">
        <div class="num" id="totalMins">–</div>
        <div class="lbl">min read</div>
      </div>
    </div>
    <div class="pills">
      <button class="pill pill-all active" onclick="filter('all',this)">All</button>
      <button class="pill pill-AI" onclick="filter('AI',this)">AI</button>
      <button class="pill pill-Technology" onclick="filter('Technology',this)">Technology</button>
      <button class="pill pill-Research" onclick="filter('Research',this)">Research</button>
      <button class="pill pill-Stocks" onclick="filter('Stocks',this)">Markets</button>
    </div>
    <div class="err-note" id="errNote">Some feeds couldn't load — showing available content.</div>
    <div id="briefContent"></div>
  </div>

  <!-- ── TASKS ── -->
  <div class="tab-pane" id="pane-tasks">
    <div class="tasks-head">
      <span class="tasks-title">Tasks</span>
      <span class="tasks-badge" id="taskBadge">0 left</span>
    </div>
    <div class="task-row-input">
      <input class="task-inp" id="taskInp" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask()">
      <button class="task-add-btn" onclick="addTask()">+</button>
    </div>
    <div class="task-list" id="taskList"></div>
  </div>

  <!-- ── CALENDAR ── -->
  <div class="tab-pane" id="pane-calendar">
    <div style="padding:4px 16px 14px"><span style="font-size:22px;font-weight:700">Calendar</span></div>
    <div class="cal-card">
      <div class="cal-nav">
        <button class="cal-btn" onclick="calShift(-1)">‹</button>
        <div class="cal-month" id="calMonth"></div>
        <button class="cal-btn" onclick="calShift(1)">›</button>
      </div>
      <div class="cal-grid">
        <div class="cal-dow"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
        <div class="cal-days" id="calDays"></div>
      </div>
    </div>
    <div class="gcal-btn-wrap">
      <h3>Open Google Calendar</h3>
      <p>Your full schedule for<br>attilahuba.vizhanyo@gmail.com</p>
      <a href="https://calendar.google.com/calendar/r" target="_blank" class="gcal-open">Open Calendar →</a>
    </div>
  </div>

</div>

<nav class="tab-bar">
  <div class="tab-item active" onclick="goTab('brief',this)"><div class="tab-label">Brief</div></div>
  <div class="tab-item" onclick="goTab('tasks',this)"><div class="tab-label">Tasks</div></div>
  <div class="tab-item" onclick="goTab('calendar',this)"><div class="tab-label">Calendar</div></div>
</nav>

<script>
// ── CONFIG ──────────────────────────────────
const TOPICS = {
  AI: {
    color: '#0A84FF',
    label: 'Artificial Intelligence',
    feeds: [
      'https://venturebeat.com/category/ai/feed/',
      'https://www.artificialintelligence-news.com/feed/',
      'https://techcrunch.com/category/artificial-intelligence/feed/'
    ]
  },
  Technology: {
    color: '#30d158',
    label: 'Technology',
    feeds: [
      'https://techcrunch.com/feed/',
      'https://www.theverge.com/rss/index.xml',
      'https://www.wired.com/feed/rss'
    ]
  },
  Research: {
    color: '#bf5af2',
    label: 'Research & Science',
    feeds: [
      'https://arxiv.org/rss/cs.AI',
      'https://www.sciencedaily.com/rss/computers_math/artificial_intelligence.xml',
      'https://rss.arxiv.org/rss/cs.LG'
    ]
  },
  Stocks: {
    color: '#ff9f0a',
    label: 'Markets & Finance',
    feeds: [
      'https://feeds.finance.yahoo.com/rss/2.0/headline?s=^GSPC,^NDX,AAPL,NVDA,MSFT',
      'https://www.marketwatch.com/rss/topstories',
      'https://feeds.a.dj.com/rss/RSSMarketsMain.xml'
    ]
  }
};

const R2J = 'https://api.rss2json.com/v1/api.json?rss_url=';
const WPM = 220;
const TARGET_MIN = 10;
const TARGET_MAX = 15;

// ── X EMBED CONFIG ───────────────────────────
const X_SEARCH = {
  AI:         'AI OR OpenAI OR ChatGPT OR LLM',
  Technology: 'technology OR "big tech" OR software',
  Research:   'research OR science OR breakthrough',
  Stocks:     'stocks OR market OR investing OR finance'
};

// ── STATE ────────────────────────────────────
let data = {};
let xData = {};
let xMode = false;
let activeFilter = 'all';
let calDate = new Date();

// ── BOOT ─────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setHeader();
  loadAll();
  renderTasks();
  renderCal();
});

function setHeader() {
  const now = new Date(), h = now.getHours();
  document.getElementById('greeting').textContent =
    h < 12 ? 'Good morning, Attila' : h < 17 ? 'Good afternoon, Attila' : 'Good evening, Attila';
  document.getElementById('dateLine').textContent =
    now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

// ── UTILS ─────────────────────────────────────
function strip(h) { const d = document.createElement('div'); d.innerHTML = h; return d.textContent || ''; }
function countWords(t) { return strip(t).split(/\s+/).filter(Boolean).length; }
function readMin(t) { return Math.max(1, Math.ceil(countWords(t) / WPM)); }
function ago(s) {
  const m = Math.floor((Date.now() - new Date(s)) / 60000), hh = Math.floor(m / 60);
  return m < 1 ? 'just now' : m < 60 ? m + 'm ago' : hh < 24 ? hh + 'h ago' : Math.floor(hh / 24) + 'd ago';
}
function src(a) {
  try { return (a.author || new URL(a.link || 'http://x').hostname.replace('www.', '')).slice(0, 25); }
  catch { return 'News'; }
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getScore(title, desc) {
  const t = (title + ' ' + (desc || '')).toLowerCase();
  if (/breaking|crash|collaps|attack|hack|breach|war|recall|fraud|lawsuit|shutdown|crisis|threat|ban|emergency|dead|kill/i.test(t)) return 9;
  if (/major|historic|milestone|record.break|critical|significant|massive|urgent/i.test(t)) return 8;
  if (/launch|acqui|ipo|breakthrough|open.source|raises.*billion|new.*model/i.test(t)) return 7;
  if (/announc|introduc|reveal|partner|study|research|report|unveil/i.test(t)) return 6;
  if (/update|new |beats|expands|cuts|rises|drops|shows|finds/i.test(t)) return 5;
  if (/plan|consider|might|could|expect|explore/i.test(t)) return 4;
  return 3;
}

function scoreColor(n) {
  if (n >= 8) return { color: '#ff453a', bg: 'rgba(255,69,58,0.15)' };
  if (n >= 6) return { color: '#ff9f0a', bg: 'rgba(255,159,10,0.15)' };
  return { color: '#30d158', bg: 'rgba(48,209,88,0.15)' };
}

function getSummary(desc) {
  const text = strip(desc);
  const sentences = text.match(/[^.!?]+[.!?]+/g) || [];
  return sentences
    .map(s => s.trim())
    .filter(s => s.split(/\s+/).length > 4)
    .slice(0, 3)
    .join(' ');
}

// ── NEWS ──────────────────────────────────────
async function fetchFeed(url) {
  try {
    const r = await fetch(R2J + encodeURIComponent(url), { signal: AbortSignal.timeout(9000) });
    if (!r.ok) return [];
    const d = await r.json();
    return d.status === 'ok' ? d.items : [];
  } catch { return []; }
}

function showSkeleton() {
  document.getElementById('briefContent').innerHTML = [1, 2, 3].map(() => `
    <div class="skel skel-card"></div>
    <div class="skel skel-card" style="height:140px;margin-top:10px"></div>
  `).join('');
}

async function loadAll() {
  showSkeleton();
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin');
  let anyErr = false;

  await Promise.all(Object.entries(TOPICS).map(async ([topic, cfg]) => {
    const fetches = await Promise.allSettled(cfg.feeds.map(u => fetchFeed(u)));
    let items = [];
    fetches.forEach(r => { if (r.status === 'fulfilled') items.push(...r.value); });
    if (!items.length) { anyErr = true; }

    const seen = new Set();
    items = items.filter(a => { if (seen.has(a.title)) return false; seen.add(a.title); return true; });
    items.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

    let chosen = [], totalWords = 0;
    const targetWords = TARGET_MIN * WPM;
    const maxWords = TARGET_MAX * WPM;

    for (const art of items) {
      const w = countWords(art.description || art.title || '');
      if (totalWords + w > maxWords && chosen.length >= 3) break;
      chosen.push(art);
      totalWords += w;
      if (totalWords >= targetWords && chosen.length >= 4) break;
    }

    if (chosen.length < 3) chosen = items.slice(0, 3);
    if (chosen.length > 6) chosen = chosen.slice(0, 6);

    // Sort by importance score descending
    chosen.sort((a, b) => getScore(b.title, b.description || '') - getScore(a.title, a.description || ''));

    data[topic] = chosen;
  }));

  btn.classList.remove('spin');
  document.getElementById('errNote').style.display = anyErr ? 'block' : 'none';
  updateSummaryBar();
  renderBrief();
}

function updateSummaryBar() {
  let totalWords = 0, totalArticles = 0;
  Object.values(data).forEach(arts => {
    arts.forEach(a => { totalWords += countWords(a.description || a.title); });
    totalArticles += arts.length;
  });
  const mins = Math.ceil(totalWords / WPM);
  document.getElementById('totalMins').textContent = '~' + mins;
  document.getElementById('briefSub').textContent = totalArticles + ' stories across 4 topics';
}

function refreshAll() {
  if (xMode) { xData = {}; loadXMode(); } else { data = {}; loadAll(); }
}


// ── X EMBED MODE ─────────────────────────────
function loadXMode() {
  renderXMode();
}

function renderXMode() {
  const topics = activeFilter === 'all' ? Object.keys(X_SEARCH) : [activeFilter];

  let html = `<div class="x-banner">
    <div>
      <div class="x-banner-label">X — live posts</div>
      <div class="x-banner-sub">Real-time posts from X (Twitter)</div>
    </div>
  </div>`;

  topics.forEach((topic, tIdx) => {
    const cfg = TOPICS[topic];
    const query = X_SEARCH[topic];
    if (tIdx > 0) html += '<div class="divider"></div>';
    html += `<div class="x-topic-header">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="topic-dot" style="background:${cfg.color}"></div>
        <span class="x-topic-name" style="color:${cfg.color}">${topic}</span>
      </div>
    </div>
    <div style="margin:0 16px 16px">
      <a class="twitter-timeline"
         data-theme="dark"
         data-tweet-limit="5"
         data-chrome="noheader nofooter transparent"
         data-dnt="true"
         href="https://twitter.com/search?q=${encodeURIComponent(query)}&src=typed_query&f=live">
        Loading X posts...
      </a>
    </div>`;
  });

  document.getElementById('briefContent').innerHTML = html;

  if (window.twttr && window.twttr.widgets) {
    window.twttr.widgets.load();
  } else {
    const s = document.createElement('script');
    s.src = 'https://platform.twitter.com/widgets.js';
    s.async = true;
    document.head.appendChild(s);
  }
}

function toggleXMode() {
  xMode = !xMode;
  document.getElementById('xModeBtn').classList.toggle('active', xMode);
  if (xMode) {
    loadXMode();
  } else {
    if (Object.keys(data).length) renderBrief(); else loadAll();
  }
}

function filter(t, btn) {
  activeFilter = t;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  if (xMode) { xData = {}; loadXMode(); } else renderBrief();
}


function renderBrief() {
  const topics = activeFilter === 'all' ? Object.keys(TOPICS) : [activeFilter];
  let html = '';

  topics.forEach((topic, tIdx) => {
    const cfg = TOPICS[topic];
    const arts = data[topic] || [];
    if (!arts.length) return;

    if (tIdx > 0) html += '<div class="divider"></div>';

    const topicWords = arts.reduce((s, a) => s + countWords(a.description || a.title), 0);
    const topicMins = Math.ceil(topicWords / WPM);

    html += `<div class="topic-header">
      <div class="topic-header-left">
        <div class="topic-dot" style="background:${cfg.color}"></div>
        <span class="topic-name" style="color:${cfg.color}">${topic}</span>
      </div>
      <span class="topic-meta">${arts.length} stories · ~${topicMins} min</span>
    </div>`;

    // Category overview block
    const overviewItems = arts.map(a => {
      const score = getScore(a.title || '', a.description || '');
      const sc = scoreColor(score);
      const firstSentence = (strip(a.description || '').match(/[^.!?]+[.!?]+/) || [''])[0].trim();
      const line = firstSentence.split(/\s+/).length > 4 ? firstSentence : strip(a.title || '');
      return `<div class="cat-overview-item">
        <span class="cat-overview-score" style="color:${sc.color}">${score}</span>
        <span class="cat-overview-text">${esc(line)}</span>
      </div>`;
    }).join('');
    html += `<div class="cat-overview">
      <div class="cat-overview-title">Today at a glance</div>
      ${overviewItems}
    </div>`;

    arts.forEach(a => {
      const score = getScore(a.title || '', a.description || '');
      const sc = scoreColor(score);
      const summary = getSummary(a.description || '');

      html += `<div class="article-card">
        <div class="article-card-top">
          <div class="score-badge" style="background:${sc.bg};color:${sc.color}">${score}</div>
          <span class="article-source">${esc(src(a))}</span>
        </div>
        <div class="article-title">${esc(a.title || '')}</div>
        ${summary ? `<div class="article-summary">${esc(summary)}</div>` : ''}
        <div class="article-footer">
          <span class="article-ago">${ago(a.pubDate)}</span>
          <a class="article-read-link" href="${esc(a.link || '#')}" target="_blank" rel="noopener">Read full article →</a>
        </div>
      </div>`;
    });
  });

  if (!html) {
    html = `<div class="empty"><p>Couldn't load stories.<br>Check your connection and tap refresh.</p></div>`;
  }

  document.getElementById('briefContent').innerHTML = html;
}

// ── TASKS ─────────────────────────────────────
const LS = 'atd_tasks_v2';
function getTasks() { try { return JSON.parse(localStorage.getItem(LS) || '[]'); } catch { return []; } }
function putTasks(t) { localStorage.setItem(LS, JSON.stringify(t)); }
function addTask() {
  const inp = document.getElementById('taskInp'), txt = inp.value.trim();
  if (!txt) return;
  const t = getTasks(); t.unshift({ id: Date.now(), text: txt, done: false }); putTasks(t);
  inp.value = ''; renderTasks();
}
function toggleTask(id) { const t = getTasks(), x = t.find(t => t.id === id); if (x) x.done = !x.done; putTasks(t); renderTasks(); }
function delTask(id) { putTasks(getTasks().filter(t => t.id !== id)); renderTasks(); }
function renderTasks() {
  const tasks = getTasks(), rem = tasks.filter(t => !t.done).length;
  document.getElementById('taskBadge').textContent = rem === 0 ? 'All done' : rem + ' left';
  const el = document.getElementById('taskList');
  if (!tasks.length) { el.innerHTML = `<div class="empty"><p>No tasks yet.<br>Add something above.</p></div>`; return; }
  el.innerHTML = [...tasks].sort((a, b) => a.done - b.done).map(t =>
    `<div class="task-row ${t.done ? 'done' : ''}">
      <div class="task-check ${t.done ? 'on' : ''}" onclick="toggleTask(${t.id})"></div>
      <div class="task-txt">${esc(t.text)}</div>
      <button class="task-del" onclick="delTask(${t.id})">✕</button>
    </div>`
  ).join('');
}

// ── CALENDAR ──────────────────────────────────
function renderCal() {
  const now = new Date(), y = calDate.getFullYear(), m = calDate.getMonth();
  document.getElementById('calMonth').textContent = calDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const first = new Date(y, m, 1).getDay(), total = new Date(y, m + 1, 0).getDate(), prev = new Date(y, m, 0).getDate();
  const cells = Math.ceil((first + total) / 7) * 7;
  let html = '';
  for (let i = 0; i < cells; i++) {
    const d = i - first + 1;
    if (d < 1) html += `<div class="cal-d dim">${prev + d}</div>`;
    else if (d > total) html += `<div class="cal-d dim">${d - total}</div>`;
    else {
      const isToday = y === now.getFullYear() && m === now.getMonth() && d === now.getDate();
      html += `<div class="cal-d ${isToday ? 'today' : ''}">${d}</div>`;
    }
  }
  document.getElementById('calDays').innerHTML = html;
}
function calShift(n) { calDate.setMonth(calDate.getMonth() + n); renderCal(); }

// ── NAV ───────────────────────────────────────
function goTab(name, el) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('pane-' + name).classList.add('active');
  el.classList.add('active');
  document.getElementById('content').scrollTop = 0;
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
